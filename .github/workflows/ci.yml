name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies (including dev + cli extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cli]"

      - name: Lint with ruff
        run: |
          ruff check src tests

      - name: Run tests
        run: |
          pytest -q --tb=short

      - name: Build sdist and wheel (packaging check)
        run: |
          pip install build
          python -m build --sdist --wheel --outdir dist
          ls -l dist/

      - name: Smoke test CLI
        run: |
          hoglah --version
          hoglah --help
          hoglah ps --limit 1 || true
